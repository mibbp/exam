services:
  backend:
    build:
      context: ../backend
    container_name: exam_backend
    restart: always
    network_mode: host
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-exam_user}:${MYSQL_PASSWORD:-exam_pass}@127.0.0.1:3306/${MYSQL_DATABASE:-exam_db}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123}
      SEED_STUDENT_PASSWORD: ${SEED_STUDENT_PASSWORD:-Student@123}
      TZ: UTC

  frontend:
    build:
      context: ../frontend
    container_name: exam_frontend
    restart: always
    network_mode: host
    volumes:
      - ../frontend/nginx.host.conf:/etc/nginx/conf.d/default.conf:ro
